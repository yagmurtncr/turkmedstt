name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint & test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Ruff (pyflakes + import order)
        run: ruff check .
      - name: Pytest (metrics + text utils)
        run: pytest -q
